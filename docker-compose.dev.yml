services:
  vpn:
    image: dperson/openvpn-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "3030:3030"
    volumes:
      - vpn-data:/vpn
    environment:
      - FIREWALL=
    healthcheck:
      test: ["CMD", "ip", "link", "show", "tun0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    network_mode: "service:vpn"
    volumes:
      - ./backend/src:/app/src
      - vpn-data:/vpn
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgresql://dba_app:dba_secret@172.18.0.1:5433/dba_analyser
      - DBA_MASTER_KEY=dev-master-key-change-in-prod-32ch
      - JWT_SECRET=dev-jwt-secret-change-in-prod
      - NODE_ENV=development
      - VPN_CONFIG_PATH=/vpn
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      vpn:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_API_URL=http://localhost:3030
    depends_on:
      - vpn

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dba_analyser
      POSTGRES_USER: dba_app
      POSTGRES_PASSWORD: dba_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_app -d dba_analyser"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  vpn-data:
