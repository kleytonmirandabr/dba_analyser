services:
  # ─── VPN Container (OpenVPN Client) ─────────────────────
  vpn:
    image: dperson/openvpn-client
    container_name: dba_analyser-vpn-1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - vpn-data:/vpn
    environment:
      - FIREWALL=
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 2>/dev/null && ping -c 1 -W 3 10.0.0.18 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Backend (Node.js + Express + TypeScript) ────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dba_analyser-backend-1
    ports:
      - "3030:3030"
    volumes:
      - ./backend/src:/app/src
      - vpn-data:/vpn
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgresql://dba_app:dba_secret@postgres:5432/dba_analyser
      - DBA_MASTER_KEY=${DBA_MASTER_KEY:-dev-master-key-change-in-prod}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      - NODE_ENV=development
      - VPN_CONFIG_PATH=/vpn
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (React + Vite) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dba_analyser-frontend-1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
    environment:
      - VITE_API_URL=
    depends_on:
      - backend

  # ─── PostgreSQL (DB interno do sistema) ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dba_analyser-postgres-1
    environment:
      POSTGRES_DB: dba_analyser
      POSTGRES_USER: dba_app
      POSTGRES_PASSWORD: dba_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_app -d dba_analyser"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  vpn-data:
