services:
  # ─── VPN Container (OpenVPN Client) ─────────────────────
  vpn:
    image: dperson/openvpn-client
    container_name: dba_analyser-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - vpn-data:/vpn
    environment:
      - FIREWALL=
    ports:
      - "3030:3030"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Backend (Node.js + Express + TypeScript) ────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dba_analyser-backend
    network_mode: "service:vpn"
    volumes:
      - vpn-data:/vpn:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgresql://dba_app:${DB_PASSWORD:-dba_secret}@postgres:5432/dba_analyser
      - DBA_MASTER_KEY=${DBA_MASTER_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - VPN_CONFIG_PATH=/vpn
    depends_on:
      vpn:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend (React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dba_analyser-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── PostgreSQL (DB interno do sistema) ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dba_analyser-postgres
    environment:
      POSTGRES_DB: dba_analyser
      POSTGRES_USER: dba_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dba_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_app -d dba_analyser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  vpn-data:
