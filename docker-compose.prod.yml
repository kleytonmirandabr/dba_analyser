version: '3.8'

services:
  # ─── VPN Container (OpenVPN Client) ─────────────────────
  vpn:
    image: dperson/openvpn-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - vpn-data:/vpn
    environment:
      - FIREWALL=
    ports:
      - "3030:3030"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "-W", "3", "8.8.8.8"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: "service:vpn"
    volumes:
      - vpn-data:/vpn:ro
    environment:
      - DATABASE_URL=postgresql://dba_app:${DB_PASSWORD}@postgres:5432/dba_analyser
      - DBA_MASTER_KEY=${DBA_MASTER_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - VPN_CONFIG_PATH=/vpn
    depends_on:
      vpn:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── PostgreSQL (DB interno) ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dba_analyser
      POSTGRES_USER: dba_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_app -d dba_analyser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  vpn-data:
